name: QA + Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Full QA Gates
    steps:
      - uses: actions/checkout@v4

      - name: Gate 1 — JS syntax (inline script)
        run: |
          python3 -c "
          with open('index.html') as f: html = f.read()
          start = html.index('<script>') + 8
          end = html.rindex('</script>')
          with open('/tmp/inline.js','w') as f: f.write(html[start:end])
          "
          node --check /tmp/inline.js && echo "PASS: inline JS syntax" || (echo "FAIL: inline JS syntax"; exit 1)

      - name: Gate 2 — SW syntax
        run: |
          node --check sw.js && echo "PASS: sw.js syntax" || (echo "FAIL: sw.js syntax"; exit 1)

      - name: Gate 3-9 — App integrity
        run: |
          python3 << 'EOF'
          import json, sys, re

          errors = []

          # --- Corpus ---
          with open('corpus.json') as f:
              corpus = json.load(f)
          letters = corpus.get('letters', [])

          if len(letters) != 136:
              errors.append(f"Expected 136 letters, got {len(letters)}")

          nums = set(l['canonical_number'] for l in letters)
          missing = [n for n in range(1,137) if n not in nums]
          if missing:
              errors.append(f"Missing canonical numbers: {missing}")

          seen = {}
          for l in letters:
              n = l['canonical_number']
              if n in seen: errors.append(f"Duplicate: {n}")
              seen[n] = True

          total_dp = 0
          for l in letters:
              dps = l.get('display_paragraphs', [])
              total_dp += len(dps)
              for dp in dps:
                  if not dp.get('text_fr','').strip():
                      errors.append(f"L{l['canonical_number']}: empty DP")
              text = l.get('body_fr','') + ' '.join(dp.get('text_fr','') for dp in dps)
              if re.search(r'\b[Vv]olition\b', text):
                  errors.append(f"L{l['canonical_number']}: contains 'Volition'")

          if total_dp != 909:
              errors.append(f"Expected 909 display_paragraphs, got {total_dp}")

          # --- index.html ---
          with open('index.html') as f:
              html = f.read()
          script = html[html.index('<script>')+8:html.rindex('</script>')]

          # No JSON.stringify in onclick
          if re.search(r'onclick="[^"]*JSON\.stringify', html):
              errors.append("BROKEN onclick with JSON.stringify found")

          # No optional chaining
          oc = re.findall(r'\?\.', script)
          if oc:
              errors.append(f"Optional chaining (?.) found: {len(oc)} occurrences")

          # No background:var(--night) — dark mode bug
          if 'background:var(--night)' in html:
              errors.append("background:var(--night) found — dark mode inversion bug")

          # CSS uses data-layout not raw media query for layout
          if '@media(min-width:768px){' in html:
              errors.append("Raw @media(min-width:768px){ found — layout must use html[data-layout]")

          # text-size-bar z-index must be > 500 (phone-reader)
          if 'z-index:200' in html and 'text-size-bar' in html:
              errors.append("text-size-bar may have wrong z-index (should be >500)")

          # Key functions present
          required_fns = [
              'filterByTopic','filterByRecipient','openLetter','renderList',
              'renderWideReader','renderPhoneReader','onResize','isWide','applyLayout',
              'buildDPs','toggleRead','updateReadBtn','confirmHighlight',
              'showUpdateBanner','applyUpdate','getFirstVisibleDpId','scrollToDpId',
          ]
          for fn in required_fns:
              if f'function {fn}(' not in script:
                  errors.append(f"Missing function: {fn}")

          # Key IDs present
          required_ids = ['wr-read-btn','pr-read-btn','hl-popup','update-banner',
                          'text-size-bar','t-highlights','note-sheet']
          for rid in required_ids:
              if f'id="{rid}"' not in html:
                  errors.append(f"Missing element id: {rid}")

          # Stale version check
          import os
          with open('sw.js') as f: sw = f.read()
          sw_cache = re.search(r"CACHE_VERSION = '([^']+)'", sw)
          if sw_cache:
              sw_ver = sw_cache.group(1)
              html_ver = re.search(r'v(\d+\.\d+\.\d+) · \d{4}', html)
              if html_ver:
                  html_ver_str = 'luisa-v' + html_ver.group(1)
                  if sw_ver != html_ver_str:
                      errors.append(f"Version mismatch: sw={sw_ver}, html={html_ver_str}")

          # --- SW file ---
          # No auto skipWaiting in install
          install_start = sw.find("addEventListener('install'")
          activate_start = sw.find("addEventListener('activate'")
          if install_start >= 0 and activate_start >= 0:
              install_block = sw[install_start:activate_start]
              auto_skip = [l for l in install_block.split('\n')
                          if 'skipWaiting' in l and not l.strip().startswith('//')]
              if auto_skip:
                  errors.append(f"Auto skipWaiting in install block: {auto_skip}")

          # Manifest
          with open('manifest.json') as f:
              manifest = json.load(f)
          if manifest.get('orientation') != 'any':
              errors.append(f"manifest orientation should be 'any', got: {manifest.get('orientation')}")

          # Icons present
          for icon in ['icons/icon-192.png','icons/icon-512.png','icons/apple-touch-icon.png']:
              if not os.path.exists(icon):
                  errors.append(f"Missing icon: {icon}")

          if errors:
              print(f"QA FAILED — {len(errors)} error(s):")
              for e in errors: print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print(f"QA PASS — all {len(required_fns)} functions, {len(letters)} letters, {total_dp} DPs")
          EOF

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
